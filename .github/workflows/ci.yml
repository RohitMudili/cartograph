name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cartograph
          POSTGRES_PASSWORD: cartograph
          POSTGRES_DB: cartograph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cartograph -d cartograph"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # CI Postgres is on the standard 5432; tests/migrations read these.
      DATABASE_URL: postgresql+asyncpg://cartograph:cartograph@localhost:5432/cartograph
      TEST_DATABASE_URL: postgresql+asyncpg://cartograph:cartograph@localhost:5432/cartograph
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest -m "not network" --cov=app --cov-report=term-missing

      # Network tests (live git clone) run separately and don't fail the build on
      # a transient network/host issue — they're coverage, not a gate.
      - name: Network tests (non-blocking)
        continue-on-error: true
        run: uv run pytest -m "network" -v
