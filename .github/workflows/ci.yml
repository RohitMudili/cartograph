name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright

      - name: Test (pytest)
        run: uv run pytest -m "not network" --cov=app --cov-report=term-missing

      # Network tests (live git clone) run separately and don't fail the build on
      # a transient network/host issue — they're coverage, not a gate.
      - name: Network tests (non-blocking)
        continue-on-error: true
        run: uv run pytest -m "network" -v
