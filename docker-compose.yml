# Runs the API against Supabase (the single database for every environment —
# there is no local Postgres). Usage:
#   cp backend/.env.example backend/.env   # set DATABASE_URL (Supabase) + GOOGLE_API_KEY
#   docker compose up --build
#
# The api applies migrations against Supabase, then serves.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # All config — including the Supabase DATABASE_URL — comes from backend/.env.
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    # Apply migrations, then serve. `exec` so uvicorn is PID 1 and receives signals.
    command: >
      sh -c "alembic upgrade head &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
